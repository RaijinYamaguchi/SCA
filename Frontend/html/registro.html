<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Crear Cuenta — S.C.A</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body class="auth-page">

  <!-- ══ HEADER (mismo que index) ══ -->
  <header>
    <a href="../index.html" class="logo-wrap">
      <div class="logo-circle">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 2C12 2 5 9.5 5 14a7 7 0 0 0 14 0c0-4.5-7-12-7-12Z" fill="rgba(94,201,240,.9)" stroke="none"/>
          <path d="M9 17c0 1.66 1.34 3 3 3" stroke="rgba(255,255,255,.6)" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </div>
      <div class="logo-text">
        <strong>S.C.A</strong>
        <span>Sistema de Control de Agua</span>
      </div>
    </a>
    <nav class="nav-links">
      <a href="../index.html#caracteristicas">Características</a>
      <a href="../index.html#guia">Cómo Usar</a>
      <a href="../index.html#contacto">Contacto</a>
      <a href="login.html" class="btn-outline" style="margin-left:.5rem;">Iniciar Sesión</a>
      <a href="registro.html" class="btn-solid">Registrarse</a>
    </nav>
  </header>

  <!-- ══ CONTENIDO ══ -->
  <main class="auth-main">
    <div class="auth-card">

      <div class="auth-card-eyebrow">
        <span class="auth-card-eyebrow-dot"></span>
        <span class="auth-card-eyebrow-label">Es gratis</span>
      </div>

      <h1 class="auth-card-title">Crea tu cuenta</h1>
      <p class="auth-card-subtitle">Comienza a monitorear tu consumo de agua en minutos.</p>

      <form id="registroForm" class="auth-form" novalidate>

        <div class="form-group">
          <label for="nombre">Nombre completo</label>
          <input type="text" id="nombre" name="nombre"
            placeholder="Juan García"
            autocomplete="name" required>
        </div>

        <div class="form-group">
          <label for="email">Correo electrónico</label>
          <input type="email" id="email" name="email"
            placeholder="nombre@correo.com"
            autocomplete="email" required>
        </div>

        <div class="form-group">
          <label for="password">Contraseña</label>
          <input type="password" id="password" name="password"
            placeholder="Mínimo 8 caracteres"
            autocomplete="new-password" required>
          <!-- Indicador de fortaleza -->
          <div class="password-strength">
            <div class="strength-bars">
              <div class="strength-bar"></div>
              <div class="strength-bar"></div>
              <div class="strength-bar"></div>
              <div class="strength-bar"></div>
            </div>
            <span class="strength-label" id="strengthLabel"></span>
          </div>
          <span class="form-field-hint">Usa letras, números y símbolos para mayor seguridad.</span>
        </div>

        <div class="form-group">
          <label for="confirmPassword">Confirmar contraseña</label>
          <input type="password" id="confirmPassword" name="confirmPassword"
            placeholder="Repite tu contraseña"
            autocomplete="new-password" required>
        </div>

        <div id="message" class="auth-message"></div>

        <button type="submit" id="submitBtn" class="btn-auth">
          Crear cuenta
        </button>

      </form>

      <div class="auth-card-footer">
        ¿Ya tienes cuenta? <a href="login.html">Inicia sesión</a>
      </div>

    </div>
  </main>

  <script src="../js/auth.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/registro.js"></script>
</body>
</html>
