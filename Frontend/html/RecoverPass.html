<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recuperar Contraseña — S.C.A</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body class="auth-page">

  <!-- ══ HEADER (mismo que index) ══ -->
  <header>
    <a href="../index.html" class="logo-wrap">
      <div class="logo-circle">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 2C12 2 5 9.5 5 14a7 7 0 0 0 14 0c0-4.5-7-12-7-12Z" fill="rgba(94,201,240,.9)" stroke="none"/>
          <path d="M9 17c0 1.66 1.34 3 3 3" stroke="rgba(255,255,255,.6)" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </div>
      <div class="logo-text">
        <strong>S.C.A</strong>
        <span>Sistema de Control de Agua</span>
      </div>
    </a>
    <nav class="nav-links">
      <a href="../index.html#caracteristicas">Características</a>
      <a href="../index.html#guia">Cómo Usar</a>
      <a href="../index.html#contacto">Contacto</a>
      <a href="login.html" class="btn-outline" style="margin-left:.5rem;">Iniciar Sesión</a>
      <a href="registro.html" class="btn-solid">Registrarse</a>
    </nav>
  </header>

  <!-- ══ CONTENIDO ══ -->
  <main class="auth-main">
    <div class="auth-card">

      <!-- Ícono ilustrativo -->
      <div class="auth-icon-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="11" width="18" height="11" rx="2"/>
          <path d="M7 11V7a5 5 0 0 1 9.9-1"/>
          <circle cx="12" cy="16" r="1" fill="currentColor" stroke="none"/>
        </svg>
      </div>

      <h1 class="auth-card-title">Recupera tu contraseña</h1>
      <p class="auth-card-subtitle">
        Ingresa el correo asociado a tu cuenta y te enviaremos un enlace para restablecerla.
      </p>

      <form id="recoverForm" class="auth-form" novalidate>

        <div class="form-group">
          <label for="email">Correo electrónico</label>
          <input type="email" id="email" name="email"
            placeholder="nombre@correo.com"
            autocomplete="email" required>
        </div>

        <div id="message" class="auth-message"></div>

        <button type="submit" id="submitBtn" class="btn-auth">
          Enviar enlace de recuperación
        </button>

      </form>

      <div class="auth-divider">o</div>

      <a href="login.html" class="btn-auth-ghost">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M19 12H5M12 5l-7 7 7 7"/>
        </svg>
        Volver a iniciar sesión
      </a>

      <div class="auth-card-footer">
        ¿No tienes cuenta? <a href="registro.html">Regístrate gratis</a>
      </div>

    </div>
  </main>

  <script src="../js/auth.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/recoverpass.js"></script>
</body>
</html>
