<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar Sesión — S.C.A</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body class="auth-page">

  <!-- ══ HEADER (mismo que index) ══ -->
  <header>
    <a href="../index.html" class="logo-wrap">
      <div class="logo-circle">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 2C12 2 5 9.5 5 14a7 7 0 0 0 14 0c0-4.5-7-12-7-12Z" fill="rgba(94,201,240,.9)" stroke="none"/>
          <path d="M9 17c0 1.66 1.34 3 3 3" stroke="rgba(255,255,255,.6)" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </div>
      <div class="logo-text">
        <strong>S.C.A</strong>
        <span>Sistema de Control de Agua</span>
      </div>
    </a>
    <nav class="nav-links">
      <a href="../index.html#caracteristicas">Características</a>
      <a href="../index.html#guia">Cómo Usar</a>
      <a href="../index.html#contacto">Contacto</a>
      <a href="login.html" class="btn-outline" style="margin-left:.5rem;">Iniciar Sesión</a>
      <a href="registro.html" class="btn-solid">Registrarse</a>
    </nav>
  </header>

  <!-- ══ CONTENIDO ══ -->
  <main class="auth-main">
    <div class="auth-card">

      <div class="auth-card-eyebrow">
        <span class="auth-card-eyebrow-dot"></span>
        <span class="auth-card-eyebrow-label">Acceso seguro</span>
      </div>

      <h1 class="auth-card-title">Bienvenido de nuevo</h1>
      <p class="auth-card-subtitle">Ingresa tus credenciales para acceder a tu cuenta.</p>

      <form id="loginForm" class="auth-form" novalidate>

        <div class="form-group">
          <label for="email">Correo electrónico</label>
          <input type="email" id="email" name="email"
            placeholder="nombre@correo.com"
            autocomplete="email" required>
        </div>

        <div class="form-group">
          <label for="password">Contraseña</label>
          <input type="password" id="password" name="password"
            placeholder="••••••••"
            autocomplete="current-password" required>
          <div class="form-forgot">
            <a href="RecoverPass.html">¿Olvidaste tu contraseña?</a>
          </div>
        </div>

        <div id="message" class="auth-message"></div>

        <button type="submit" id="submitBtn" class="btn-auth">
          Iniciar sesión
        </button>

      </form>

      <div class="auth-card-footer">
        ¿No tienes cuenta? <a href="registro.html">Regístrate gratis</a>
      </div>

    </div>
  </main>

  <script src="../js/auth.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/login.js"></script>
</body>
</html>
