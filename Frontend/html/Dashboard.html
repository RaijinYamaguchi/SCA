<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Sistema de Medidores</title>
    <link rel="stylesheet" href="../css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <header>
        <h2>Sistema de Medidores de Agua</h2>
        <nav>
            <a href="../index.html">Inicio</a>
            <button id="logoutBtn" class="logout-btn">Cerrar Sesión</button>
        </nav>
    </header>

    <div class="dashboard-container">
        <div class="dashboard-header">
            <h1>Dashboard de Medidores</h1>
            <div class="meter-selector">
                <label for="meterSelector">Selecciona un medidor:</label>
                <select id="meterSelector"></select>
            </div>
        </div>

        <div class="dashboard-content">
            <div class="section">
                <h2>Consumo</h2>
                <div id="consumptionData" class="consumption-grid">
                    <!-- Populated by JavaScript -->
                </div>
            </div>

            <div class="section">
                <h2>Gráfico de Consumo</h2>
                <canvas id="consumptionChart"></canvas>
            </div>

            <div class="section">
                <h2>Historial de Lecturas</h2>
                <button id="addReadingBtn" class="add-btn">+ Agregar Lectura</button>
                <div id="readingsTable">
                    <!-- Populated by JavaScript -->
                </div>
            </div>
        </div>
    </div>

    <!-- Modal para agregar lectura -->
    <div id="addReadingModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2>Agregar Nueva Lectura</h2>
            <form id="readingForm">
                <label for="readingValue">Valor de lectura (m³):</label>
                <input type="number" id="readingValue" step="0.01" required>
                <button type="submit">Agregar Lectura</button>
            </form>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 Sistema de Medidores de Agua. Todos los derechos reservados.</p>
    </footer>

    <script src="../js/auth.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/dashboard.js"></script>
    <script>
        // Modal handling
        const modal = document.getElementById('addReadingModal');
        const closeBtn = document.querySelector('.close');
        const readingForm = document.getElementById('readingForm');

        closeBtn?.addEventListener('click', () => {
            modal.style.display = 'none';
        });

        window.addEventListener('click', (e) => {
            if (e.target === modal) {
                modal.style.display = 'none';
            }
        });

        readingForm?.addEventListener('submit', (e) => {
            e.preventDefault();
            dashboard.submitReading();
        });
    </script>
</body>
</html>
